<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Pleacode | Institutional Case Management</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Hidden forms for Netlify Forms (SPA detection) -->
    <form name="contact" data-netlify="true" hidden>
      <input type="text" name="name" />
      <input type="text" name="organisation" />
      <input type="email" name="email" />
      <input type="tel" name="contact_number" />
      <input type="hidden" name="form_type" value="contact" />
    </form>
    <form name="job-application" data-netlify="true" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="hidden" name="form_type" value="job" />
      <input type="hidden" name="role" value="Full Stack Developer" />
    </form>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
